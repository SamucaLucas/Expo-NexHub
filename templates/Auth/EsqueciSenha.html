{{ define "EsqueciSenha" }}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/img/logo2.png" type="image/png">
    <title>Admin - NexHub</title>
    <link rel="icon" href="/static/img/logo2.png" type="image/png">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #09090b;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card-responsive {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            position: relative;
            z-index: 10;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 480px) {
            .auth-card-responsive {
                padding: 25px;
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="supernova-container">
        <div class="orb orb-blue"></div>
        <div class="orb orb-orange"></div>
        <div class="orb orb-teal"></div>
    </div>

    <div class="auth-card-responsive">

        <div style="text-align: center; margin-bottom: 30px;">
            <div
                style="background: rgba(0, 255, 209, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto; border: 1px solid rgba(0, 255, 209, 0.2);">
                <i class="ph ph-lock-key" style="font-size: 2rem; color: var(--brand-teal);"></i>
            </div>
            <h2 style="color: white; margin-bottom: 10px; font-size: 1.5rem; font-weight: 700;">Esqueceu a senha?</h2>
            <p style="color: #a1a1aa; font-size: 0.95rem; line-height: 1.5;">
                Digite seu e-mail cadastrado e enviaremos um código de recuperação.
            </p>
        </div>

        <form action="/esqueci-senha" method="POST">
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label"
                    style="display: block; color: white; margin-bottom: 10px; font-size: 0.9rem; font-weight: 500;">Seu
                    E-mail</label>

                <div style="position: relative; width: 100%;">

                    <i class="ph ph-envelope"
                        style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #71717a; font-size: 1.3rem; pointer-events: none;"></i>

                    <input type="email" name="email" placeholder="exemplo@email.com" required
                        style="width: 100%; height: 50px; padding: 0 15px 0 45px; background-color: #27272a; border: 1px solid #3f3f46; color: white; border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; transition: border-color 0.2s;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; height: 50px; background: var(--brand-teal); color: black; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: transform 0.2s;">
                Enviar Código
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="/login"
                style="color: var(--brand-teal); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s;">
                <i class="ph ph-arrow-left"></i> Voltar para Login
            </a>
        </div>
    </div>

    <script>
        const input = document.querySelector('input[name="email"]');
        input.addEventListener('focus', () => {
            input.style.borderColor = 'var(--brand-teal)';
        });
        input.addEventListener('blur', () => {
            input.style.borderColor = '#3f3f46';
        });
    </script>

</body>

</html>
{{ end }}
