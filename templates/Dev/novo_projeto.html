{{ define "NovoProjeto" }}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Projeto - NexHub</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body style="background-color: #09090b;">

    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="/" style="margin-bottom: 10px;"><img src="/static/img/logo2.png" style="width: 40px;"></a>
            <nav class="sidebar-menu">
                <a href="/dev/dashboard" class="sidebar-item"><i class="ph ph-house"></i></a>
                <a href="/dev/meus-projetos" class="sidebar-item active"><i class="ph ph-folder"></i></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="settings-container">

                <div style="margin-bottom: 20px;">
                    <h1 style="color: white;">Cadastrar Projeto</h1>
                </div>

                <form action="/dev/novo-projeto" method="POST" enctype="multipart/form-data">

                    <div class="form-group">
                        <label class="form-label">Capa do Projeto</label>
                        <label for="capa-upload" class="upload-box"
                            style="border: 2px dashed #333; padding: 20px; text-align: center; cursor: pointer; display: block;">
                            <img id="preview-image" src="" style="max-width: 100%; display: none; margin: 0 auto;">
                            <div id="upload-placeholder">
                                <i class="ph ph-image-square" style="font-size: 2rem; color: var(--brand-teal);"></i>
                                <p style="color: gray;">Clique para selecionar imagem</p>
                            </div>
                            <input type="file" id="capa-upload" name="imagem_capa" accept="image/*"
                                style="display: none;" onchange="previewFile()">
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nome do Projeto</label>
                        <input type="text" class="form-input" name="titulo" required>
                    </div>

                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label class="form-label">Categoria</label>

                            <select class="form-input" name="categoria" id="select-categoria"
                                onchange="verificarOutros()">
                                <option value="Tecnologia" selected>Tecnologia Geral</option>
                                <option value="Educacao">Educação</option>
                                <option value="Mineracao">Mineração</option>
                                <option value="Saude">Saúde</option>
                                <option value="Comercio">Comércio / Varejo</option>
                                <option value="Agro">Agronegócio</option>
                                <option value="Outros">Outros (Especificar)</option>
                            </select>

                            <div id="campo-outros" style="display: none; margin-top: 10px;">
                                <label class="form-label" style="font-size: 0.85rem; color: var(--brand-teal);">Qual
                                    categoria?</label>
                                <input type="text" class="form-input" name="outra_categoria" id="input-outros"
                                    placeholder="Ex: Games, IA, Robótica...">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Cidade</label>
                            <select class="form-input" name="cidade" required>
                                <option value="Canaã dos Carajás">Canaã dos Carajás</option>
                                <option value="Parauapebas">Parauapebas</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select class="form-input" name="status" required>
                            <option value="Planejado">🔵 Planejado</option>
                            <option value="Em Andamento">🟡 Em Andamento</option>
                            <option value="Concluido">🟢 Concluído</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-input" name="descricao" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tecnologias Utilizadas</label>

                        <div class="tech-grid">

                            {{ range .TodasTechs }}
                            <input type="checkbox" id="tech-{{ .Nome }}" name="techs" value="{{ .Nome }}"
                                class="tech-checkbox-input">

                            <label for="tech-{{ .Nome }}" class="tech-checkbox-label">
                                <i class="ph ph-check-bold tech-check-icon"></i>
                                {{ .Nome }}
                            </label> {{ end }}

                        </div>
                        <small style="color: #666; font-size: 0.8rem; margin-top: 8px; display: block;">Clique para
                            selecionar as ferramentas usadas no projeto.</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Link do Repositório</label>
                        <input type="text" class="form-input" name="link_repositorio"
                            placeholder="https://github.com/...">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Publicar
                        Projeto</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function previewFile() {
            const preview = document.getElementById('preview-image');
            const placeholder = document.getElementById('upload-placeholder');
            const file = document.getElementById('capa-upload').files[0];
            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
            if (file) reader.readAsDataURL(file);
        }

        function verificarOutros() {
            const select = document.getElementById('select-categoria');
            const divOutros = document.getElementById('campo-outros');
            const inputOutros = document.getElementById('input-outros');

            if (select.value === 'Outros') {
                divOutros.style.display = 'block'; // Mostra o campo
                inputOutros.required = true; // Torna obrigatório escrever algo
            } else {
                divOutros.style.display = 'none'; // Esconde
                inputOutros.value = ''; // Limpa o que foi escrito
                inputOutros.required = false; // Tira a obrigatoriedade
            }
        }
    </script>
</body>

</html>
{{ end }}
