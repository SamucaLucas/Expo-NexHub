{{ define "GlobalNotifications" }}

<style>
    /* CSS MANTIDO IGUAL */
    #global-notification-area {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
    }

    .toast-card {
        background: rgba(24, 24, 27, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 4px solid transparent;
        padding: 15px;
        border-radius: 8px;
        min-width: 280px;
        max-width: 350px;
        color: white;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        pointer-events: auto;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideInRightGlobal 0.3s ease-out;
        transition: transform 0.2s;
    }

    .toast-border-dev {
        border-left-color: var(--brand-teal) !important;
    }

    .toast-border-empresa {
        border-left-color: var(--brand-orange) !important;
    }

    .toast-border-admin {
        border-left-color: #a855f7 !important;
    }

    .border-dev {
        border-color: var(--brand-teal) !important;
    }

    .border-empresa {
        border-color: var(--brand-orange) !important;
    }

    .border-admin {
        border-color: #a855f7 !important;
    }

    .toast-card:hover {
        transform: translateX(-5px);
    }

    .toast-avatar {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid transparent;
        padding: 2px;
    }

    .toast-content h4 {
        margin: 0;
        font-size: 0.9rem;
        color: white;
        font-weight: 600;
    }

    .toast-content p {
        margin: 0;
        font-size: 0.8rem;
        color: #a1a1aa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
    }

    @keyframes slideInRightGlobal {
        from {
            opacity: 0;
            transform: translateX(100%);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @media (max-width: 768px) {
        #global-notification-area {
            top: 10px;
            left: 10px;
            right: 10px;
            align-items: center;
        }

        .toast-card {
            width: 100%;
            max-width: 100%;
        }
    }
</style>

<div id="global-notification-area"></div>

<script>
    (function () {
        if (window.location.pathname.indexOf("/chat") !== -1) return;

        // --- A CORREÇÃO ESTÁ AQUI ---
        // Usamos apenas .Id. Assim, quem chamar o template decide qual objeto passar.
        const usuarioLogadoIdGlobal = parseInt("{{ .Id }}");

        if (!usuarioLogadoIdGlobal || isNaN(usuarioLogadoIdGlobal) || usuarioLogadoIdGlobal === 0) {
            return;
        }

        // ... (Mantenha o restante do código WebSocket e funções igual ao anterior) ...
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socketGlobal = new WebSocket(protocol + "//" + window.location.host + "/ws");

        socketGlobal.onopen = () => console.log("🔔 Notificações Globais Ativas (ID: " + usuarioLogadoIdGlobal + ")");

        socketGlobal.onmessage = (event) => {
            const dados = JSON.parse(event.data);
            if (dados.tipo === "nova_mensagem" && dados.remetente_id !== usuarioLogadoIdGlobal) {
                mostrarNotificacaoGlobal(dados);
                document.title = `(Nova Mensagem) NexHub`;
            }
        };

        function mostrarNotificacaoGlobal(dados) {
            // ... (Copie a função mostrarNotificacaoGlobal do passo anterior) ...
            // (Se quiser, eu reenvio o código completo, mas é só garantir que o ID lá em cima seja {{ .Id }})
            const audio = new Audio('/static/sounds/notification.mp3');
            audio.play().catch(e => { });

            const container = document.getElementById('global-notification-area');
            const toast = document.createElement('div');
            toast.className = 'toast-card';

            let cardBorderClass = "toast-border-dev";
            let avatarBorderClass = "border-dev";

            if (dados.remetente_tipo === "EMPRESA") {
                cardBorderClass = "toast-border-empresa";
                avatarBorderClass = "border-empresa";
            } else if (dados.remetente_tipo === "ADMIN") {
                cardBorderClass = "toast-border-admin";
                avatarBorderClass = "border-admin";
            } else if (dados.remetente_tipo === "DEV") {
                cardBorderClass = "toast-border-dev";
                avatarBorderClass = "border-dev";
            }

            toast.classList.add(cardBorderClass);

            let avatarUrl = dados.remetente_foto;
            if (!avatarUrl || avatarUrl === "") {
                const seed = dados.remetente_nome || "User";
                avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
            }

            const nome = dados.remetente_nome || "Nova Mensagem";

            toast.innerHTML = `
                <img src="${avatarUrl}" class="toast-avatar ${avatarBorderClass}">
                <div class="toast-content">
                    <h4>${nome}</h4>
                    <p>${dados.conteudo}</p>
                </div>
            `;

            toast.onclick = () => window.location.href = `/chat?id=${dados.remetente_id}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    })();
</script>
{{ end }}
